# CI de Qualidade — primeira etapa da pipeline planejada em
# docs/07-deploy/01-ambientes-e-pipeline.md (seções 3 e 6).
#
# O que roda aqui: lint (ESLint) → testes (Vitest) → build (next build,
# que inclui a checagem de tipos do TypeScript). Qualquer falha marca o
# commit/PR com um ❌ no GitHub.
#
# O que roda em outro workflow: os testes E2E (Playwright) ficam em
# e2e.yml — eles precisam do deploy novo já no ar, então usam o gatilho
# deployment_status (ver comentário de lá), não o push.
#
# O que AINDA não roda em nenhum workflow (etapas futuras):
# - Migrations (supabase db push) — ainda não existem migrations.
# - Deploy via Actions (vercel deploy) — hoje o deploy é feito pela
#   integração nativa Vercel↔GitHub, que NÃO espera este CI passar.
#   Ou seja: este workflow avisa, mas ainda não bloqueia a entrega.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qualidade:
    name: Lint, testes e build
    runs-on: ubuntu-latest
    env:
      # O runner do GitHub não tem o .env.local (que fica fora do Git) —
      # as chaves vêm dos GitHub Secrets (Settings → Secrets and variables
      # → Actions). São valores públicos por design (protegidos por RLS,
      # ver docs/04-backend/01-supabase-e-seguranca.md), mas mesmo assim
      # ficam em Secrets para não viverem escritos no repositório.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v7

      - name: Instalar o Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # npm ci (e não npm install): instala exatamente o que está no
      # package-lock.json, garantindo que o CI teste as mesmas versões
      # de pacote usadas em desenvolvimento.
      - name: Instalar dependências
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      # Roda os testes JÁ COM cobertura: o vitest.config.ts define uma meta
      # de 80% na camada de lógica (`dominio/` + `nucleo/`) e o comando falha
      # se ficar abaixo — o CI bloqueia a entrega. Ver
      # docs/06-testes/01-estrategia-de-testes.md, seção 5.
      - name: Testes unitários e de componente + cobertura (Vitest)
        run: npm run test:coverage

      - name: Build de produção (inclui checagem de tipos)
        run: npm run build
